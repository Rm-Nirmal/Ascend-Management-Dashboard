name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: "AIzaSyCOe0IdafwQ2wsc_lSqxVqXlnz1US8NvbI"
          VITE_FIREBASE_AUTH_DOMAIN: "fitcore-ascend-production.firebaseapp.com"
          VITE_FIREBASE_PROJECT_ID: "fitcore-ascend-production"
          VITE_FIREBASE_STORAGE_BUCKET: "fitcore-ascend-production.firebasestorage.app"
          VITE_FIREBASE_MESSAGING_SENDER_ID: "1040835579325"
          VITE_FIREBASE_APP_ID: "1:1040835579325:web:5b0967043371a4f9aa96d4"
          VITE_FIREBASE_MEASUREMENT_ID: "G-5G5C5TKXG8"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
